<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuralChat AI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#00f5ff;font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background-image:linear-gradient(rgba(0,245,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.03) 1px,transparent 1px);background-size:50px 50px;animation:gridMove 20s linear infinite;pointer-events:none;z-index:0;}
@keyframes gridMove{0%{transform:translateY(0);}100%{transform:translateY(50px);}}
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.05) 2px,rgba(0,0,0,0.05) 4px);pointer-events:none;z-index:1;}
#neuralCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.55;pointer-events:none;}
.container{max-width:900px;margin:0 auto;padding:20px;position:relative;z-index:2;}
header{text-align:center;padding:30px 0 20px;}
.logo{font-family:'Orbitron',monospace;font-size:2.5em;font-weight:900;letter-spacing:8px;background:linear-gradient(90deg,#00f5ff,#a855f7,#00f5ff);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite;}
@keyframes shimmer{0%{background-position:0%;}100%{background-position:200%;}}
.subtitle{font-size:0.85em;letter-spacing:4px;color:rgba(0,245,255,0.5);margin-top:5px;text-transform:uppercase;}
.status-bar{display:flex;justify-content:center;gap:20px;margin-top:15px;flex-wrap:wrap;}
.status-item{font-size:0.75em;letter-spacing:2px;color:rgba(0,245,255,0.6);display:flex;align-items:center;gap:6px;}
.status-dot{width:6px;height:6px;border-radius:50%;background:#00f5ff;box-shadow:0 0 8px #00f5ff;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.8);}}
.chat-window{background:rgba(0,0,0,0.6);border:1px solid rgba(0,245,255,0.15);border-radius:4px;height:420px;overflow-y:auto;padding:20px;margin:20px 0;position:relative;scroll-behavior:smooth;backdrop-filter:blur(6px);}
.chat-window::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#00f5ff,#a855f7,transparent);animation:scanline 3s ease-in-out infinite;}
@keyframes scanline{0%,100%{opacity:0.3;}50%{opacity:1;}}
.chat-window::-webkit-scrollbar{width:4px;}
.chat-window::-webkit-scrollbar-thumb{background:rgba(0,245,255,0.3);border-radius:2px;}
.message{margin-bottom:20px;animation:fadeIn 0.4s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.message-header{font-size:0.7em;letter-spacing:3px;margin-bottom:6px;text-transform:uppercase;}
.user-header{color:#a855f7;}
.ai-header{color:#00f5ff;}
.message-bubble{padding:12px 16px;border-radius:2px;line-height:1.6;font-size:0.95em;}
.user-bubble{background:rgba(168,85,247,0.08);border:1px solid rgba(168,85,247,0.25);border-left:3px solid #a855f7;margin-left:20px;color:rgba(255,255,255,0.85);}
.ai-bubble{background:rgba(0,245,255,0.04);border:1px solid rgba(0,245,255,0.15);border-left:3px solid #00f5ff;margin-right:20px;color:rgba(0,245,255,0.9);}
.typing{display:flex;align-items:center;gap:6px;padding:12px 16px;border:1px solid rgba(0,245,255,0.15);border-left:3px solid #00f5ff;background:rgba(0,245,255,0.04);margin-right:20px;width:fit-content;}
.typing span{width:6px;height:6px;border-radius:50%;background:#00f5ff;box-shadow:0 0 6px #00f5ff;animation:bounce 1.2s ease-in-out infinite;}
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,100%{transform:translateY(0);opacity:0.4;}50%{transform:translateY(-6px);opacity:1;}}
.input-area{display:flex;gap:10px;align-items:flex-end;}
.input-wrapper{flex:1;position:relative;}
.input-wrapper::before{content:'> ';position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(0,245,255,0.4);font-family:'Orbitron',monospace;font-size:0.8em;pointer-events:none;}
textarea{width:100%;background:rgba(0,0,0,0.7);border:1px solid rgba(0,245,255,0.2);border-radius:2px;color:#fff;padding:14px 14px 14px 32px;font-family:'Rajdhani',sans-serif;font-size:1em;resize:none;outline:none;transition:border-color 0.3s,box-shadow 0.3s;min-height:52px;max-height:120px;backdrop-filter:blur(6px);}
textarea:focus{border-color:rgba(0,245,255,0.5);box-shadow:0 0 20px rgba(0,245,255,0.08);}
textarea::placeholder{color:rgba(0,245,255,0.25);letter-spacing:1px;}
.btn-send{background:transparent;border:1px solid rgba(0,245,255,0.4);color:#00f5ff;padding:14px 24px;font-family:'Orbitron',monospace;font-size:0.75em;letter-spacing:2px;cursor:pointer;border-radius:2px;transition:all 0.3s;text-transform:uppercase;white-space:nowrap;}
.btn-send:hover{background:rgba(0,245,255,0.1);box-shadow:0 0 20px rgba(0,245,255,0.2);border-color:#00f5ff;}
.actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;}
.btn-action{background:transparent;border:1px solid rgba(168,85,247,0.3);color:rgba(168,85,247,0.8);padding:8px 16px;font-family:'Orbitron',monospace;font-size:0.65em;letter-spacing:2px;cursor:pointer;border-radius:2px;transition:all 0.3s;text-transform:uppercase;}
.btn-action:hover{background:rgba(168,85,247,0.1);border-color:#a855f7;box-shadow:0 0 15px rgba(168,85,247,0.2);color:#a855f7;}
.corner-decoration{position:fixed;width:80px;height:80px;opacity:0.3;z-index:3;}
.corner-tl{top:20px;left:20px;border-top:2px solid #00f5ff;border-left:2px solid #00f5ff;}
.corner-tr{top:20px;right:20px;border-top:2px solid #00f5ff;border-right:2px solid #00f5ff;}
.corner-bl{bottom:20px;left:20px;border-bottom:2px solid #a855f7;border-left:2px solid #a855f7;}
.corner-br{bottom:20px;right:20px;border-bottom:2px solid #a855f7;border-right:2px solid #a855f7;}
.welcome{text-align:center;padding:40px 20px;color:rgba(0,245,255,0.3);}
.welcome .icon{font-size:3em;margin-bottom:15px;display:block;}
.welcome p{font-family:'Orbitron',monospace;font-size:0.75em;letter-spacing:3px;line-height:2;}
@media(max-width:600px){.logo{font-size:1.6em;letter-spacing:4px;}.chat-window{height:340px;}.btn-send{padding:14px 16px;}}
</style>
</head>
<body>
<canvas id="neuralCanvas"></canvas>
<div class="corner-decoration corner-tl"></div>
<div class="corner-decoration corner-tr"></div>
<div class="corner-decoration corner-bl"></div>
<div class="corner-decoration corner-br"></div>
<div class="container">
  <header>
    <div class="logo">NEURALCHAT</div>
    <div class="subtitle">Advanced AI Interface v3.0</div>
    <div class="status-bar">
      <div class="status-item"><div class="status-dot"></div> SYSTEM ONLINE</div>
      <div class="status-item"><div class="status-dot"></div> NEURAL CORE ACTIVE</div>
      <div class="status-item"><div class="status-dot"></div> MEMORY ENABLED</div>
    </div>
  </header>
  <div class="chat-window" id="chatWindow">
    <div class="welcome">
      <span class="icon">⬡</span>
      <p>NEURAL INTERFACE BEREIT<br>BEGINNE KOMMUNIKATION</p>
    </div>
  </div>
  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="userInput" placeholder="Nachricht eingeben..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    </div>
    <button class="btn-send" onclick="sendMessage()">SENDEN</button>
  </div>
  <div class="actions">
    <button class="btn-action" onclick="clearMemory()">⟳ MEMORY RESET</button>
    <button class="btn-action" onclick="getSummary()">◈ TAGES-BRIEF</button>
    <button class="btn-action" onclick="clearChat()">✕ CHAT LEEREN</button>
  </div>
</div>
<script>
const canvas=document.getElementById("neuralCanvas");
const ctx=canvas.getContext("2d");
let nodes=[],connections=[],pulses=[],W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();
window.addEventListener("resize",()=>{resize();init();});
class Node{
  constructor(){
    this.x=Math.random()*W;this.y=Math.random()*H;
    this.vx=(Math.random()-0.5)*0.3;this.vy=(Math.random()-0.5)*0.3;
    this.r=Math.random()*2.5+1;this.alpha=0;
    this.target=Math.random()*0.7+0.3;
    this.born=Date.now();this.delay=Math.random()*4000;
    this.color=Math.random()>0.6?"#a855f7":"#00f5ff";
    this.phase=Math.random()*Math.PI*2;
  }
  update(now){
    const age=now-this.born-this.delay;
    if(age>0)this.alpha=Math.min(this.target,age/1200);
    this.x+=this.vx;this.y+=this.vy;
    if(this.x<0||this.x>W)this.vx*=-1;
    if(this.y<0||this.y>H)this.vy*=-1;
    this.phase+=0.02;
  }
  draw(){
    if(this.alpha<=0)return;
    const g=Math.sin(this.phase)*0.3+0.7;
    ctx.save();
    const gr=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*5);
    gr.addColorStop(0,this.color);gr.addColorStop(1,"transparent");
    ctx.beginPath();ctx.arc(this.x,this.y,this.r*5,0,Math.PI*2);
    ctx.fillStyle=gr;ctx.globalAlpha=this.alpha*g*0.2;ctx.fill();
    ctx.globalAlpha=this.alpha*g;
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=this.color;ctx.shadowBlur=12;ctx.shadowColor=this.color;
    ctx.fill();ctx.restore();
  }
}
class Pulse{
  constructor(a,b){
    this.ax=a.x;this.ay=a.y;this.bx=b.x;this.by=b.y;
    this.t=0;this.speed=Math.random()*0.008+0.004;
    this.color=Math.random()>0.5?"#00f5ff":"#a855f7";this.done=false;
  }
  update(){this.t+=this.speed;if(this.t>=1)this.done=true;}
  draw(){
    const x=this.ax+(this.bx-this.ax)*this.t;
    const y=this.ay+(this.by-this.ay)*this.t;
    ctx.save();ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);
    ctx.fillStyle=this.color;ctx.shadowBlur=15;ctx.shadowColor=this.color;
    ctx.globalAlpha=1-this.t*0.3;ctx.fill();ctx.restore();
  }
}
function init(){
  const count=Math.min(Math.floor(W*H/18000),80);
  nodes=Array.from({length:count},()=>new Node());
  connections=[];
  for(let i=0;i<nodes.length;i++)
    for(let j=i+1;j<nodes.length;j++){
      const d=Math.hypot(nodes[j].x-nodes[i].x,nodes[j].y-nodes[i].y);
      if(d<200)connections.push({a:nodes[i],b:nodes[j],alpha:0,born:Date.now()+Math.random()*3000});
    }
}
init();
let lastP=0;
function animate(now){
  ctx.clearRect(0,0,W,H);
  connections.forEach(c=>{
    if(now>c.born){
      c.alpha=Math.min(0.35,(now-c.born)/1500*0.35);
      const d=Math.hypot(c.b.x-c.a.x,c.b.y-c.a.y);
      if(d<220){
        ctx.save();
        ctx.globalAlpha=c.alpha*(1-d/220)*Math.min(c.a.alpha,c.b.alpha)*2;
        ctx.beginPath();ctx.moveTo(c.a.x,c.a.y);ctx.lineTo(c.b.x,c.b.y);
        ctx.strokeStyle="rgba(0,245,255,0.6)";ctx.lineWidth=0.5;ctx.stroke();
        ctx.restore();
      }
    }
  });
  nodes.forEach(n=>{n.update(now);n.draw();});
  if(now-lastP>400+Math.random()*600){
    const active=connections.filter(c=>c.alpha>0.1);
    if(active.length){
      const c=active[Math.floor(Math.random()*active.length)];
      pulses.push(new Pulse(Math.random()>0.5?c.a:c.b,Math.random()>0.5?c.b:c.a));
    }
    lastP=now;
  }
  pulses.forEach(p=>{p.update();p.draw();});
  pulses=pulses.filter(p=>!p.done);
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
const chatWindow=document.getElementById("chatWindow");
const userInput=document.getElementById("userInput");
let firstMessage=true;
function addMessage(role,text){
  if(firstMessage){chatWindow.innerHTML="";firstMessage=false;}
  const msg=document.createElement("div");
  msg.className="message";
  const isUser=role==="user";
  msg.innerHTML='<div class="message-header '+(isUser?"user-header":"ai-header")+'">'+(isUser?"◈ USER INPUT":"⬡ NEURAL RESPONSE")+'</div><div class="message-bubble '+(isUser?"user-bubble":"ai-bubble")+'">'+text+'</div>';
  chatWindow.appendChild(msg);
  chatWindow.scrollTop=chatWindow.scrollHeight;
}
function showTyping(){
  const t=document.createElement("div");
  t.id="typing";t.className="message";
  t.innerHTML='<div class="message-header ai-header">⬡ PROCESSING...</div><div class="typing"><span></span><span></span><span></span></div>';
  chatWindow.appendChild(t);
  chatWindow.scrollTop=chatWindow.scrollHeight;
}
function removeTyping(){const t=document.getElementById("typing");if(t)t.remove();}
async function sendMessage(){
  const text=userInput.value.trim();
  if(!text)return;
  addMessage("user",text);
  userInput.value="";userInput.style.height="auto";
  showTyping();
  try{
    const res=await fetch("/ask",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt:text})});
    const data=await res.json();
    removeTyping();
    addMessage("ai",data.result||data.error);
  }catch(e){removeTyping();addMessage("ai","VERBINDUNGSFEHLER — SYSTEM NICHT ERREICHBAR");}
}
async function clearMemory(){
  await fetch("/clear_memory",{method:"POST"});
  addMessage("ai","⟳ MEMORY ERFOLGREICH ZURÜCKGESETZT");
}
async function getSummary(){
  showTyping();
  try{
    const res=await fetch("/summary");
    const data=await res.json();
    removeTyping();
    addMessage("ai",data.result.result);
  }catch(e){removeTyping();addMessage("ai","FEHLER BEIM LADEN");}
}
function clearChat(){
  chatWindow.innerHTML='<div class="welcome"><span class="icon">⬡</span><p>SYSTEM ZURÜCKGESETZT<br>BEREIT FÜR NEUE MISSION</p></div>';
  firstMessage=true;
}
</script>
</body>
</html>
